<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrowers - PathShala</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html {
            overflow-y: scroll;
        }
        * {
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e8f5f0 0%, #c3dfd6 100%);
            min-height: 100vh;
            padding: 30px 0;
        }
        .page-header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideInDown 0.6s ease-out;
        }
        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #333;
        }
        .card-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 30px;
            animation: fadeInUp 0.6s ease-out;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: block;
        }
        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #1a4d2e;
            box-shadow: 0 0 0 3px rgba(26, 77, 46, 0.1);
        }
        .btn-add {
            background: linear-gradient(135deg, #1a4d2e 0%, #0d3d22 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(26, 77, 46, 0.4);
            color: white;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #1a4d2e;
            padding-bottom: 10px;
        }
        table thead {
            background: linear-gradient(135deg, #1a4d2e 0%, #0d3d22 100%);
            color: white;
        }
        table thead th {
            border: none;
            font-weight: 600;
            padding: 15px;
        }
        table tbody td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            vertical-align: middle;
        }
        table tbody tr {
            transition: all 0.3s ease;
        }
        table tbody tr:hover {
            background-color: #e8f5f0;
            transform: scale(1.01);
        }
        .status-yes {
            color: #e74c3c;
            font-weight: 600;
        }
        .status-no {
            color: #2ecc71;
            font-weight: 600;
        }
        .btn-remove {
            background: #ff6b6b;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-remove:hover {
            background: #ff5252;
            transform: scale(1.05);
        }
        .no-borrowers {
            text-align: center;
            padding: 40px;
        }
        .btn-back {
            background: #f0f0f0;
            border: none;
            color: #333;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
        .btn-back:hover {
            background: #e0e0e0;
            color: #333;
        }
        .required-star {
            color: #e74c3c;
        }
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <div class="container py-5">
        <div class="page-header">
            <h1>👤 Borrowers Management</h1>
        </div>

        <!-- Quick Actions -->
        <div style="text-align: center; margin-bottom: 30px;">
            <a href="/view_all_borrowers" class="btn" style="background: linear-gradient(135deg, #1a4d2e 0%, #0d3d22 100%); color: white; padding: 12px 30px; border-radius: 50px; font-weight: 600; transition: all 0.3s ease; display: inline-block; text-decoration: none; margin: 5px; cursor: pointer;">
                👥 View All Registered Users
            </a>
        </div>

        <!-- Add New Borrower Section -->
        <div class="card-section">
            <h2 class="section-title">➕ Add a New Borrower</h2>
            <form method="POST" action="/add_borrower">
                <div class="form-group">
                    <label for="name">
                        Name <span class="required-star">*</span>
                    </label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="Enter borrower's full name" minlength="2" required>
                </div>
                <div class="form-group">
                    <label for="email">
                        Email <span class="required-star">*</span>
                    </label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="Enter email address" required>
                </div>
                <div class="form-group">
                    <label for="student_id">
                        Student ID <span class="required-star">*</span>
                    </label>
                    <input type="text" id="student_id" name="student_id" class="form-control" placeholder="Enter student ID (e.g., STU001)" minlength="3" required>
                </div>
                <div class="form-group">
                    <label for="phone">
                        Phone Number
                    </label>
                    <input type="tel" id="phone" name="phone" class="form-control" placeholder="Enter phone number (optional)">
                </div>
                <div class="form-group">
                    <label for="address">
                        Address
                    </label>
                    <input type="text" id="address" name="address" class="form-control" placeholder="Enter address (optional)">
                </div>
                <button type="submit" class="btn-add">✓ Add Borrower</button>
            </form>
        </div>

        <div class="text-center">
            <a href="/" class="btn-back">← Back to Home</a>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
